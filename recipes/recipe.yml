---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: nautilus
description: Opinionated Fedora Atomic niri image.

base-image: ghcr.io/blue-build/base-images/fedora-base
image-version: 44

modules:
  - from-file: snippets/files.yml
  - from-file: snippets/dnf.yml
  - from-file: snippets/systemd.yml
  - from-file: snippets/default-flatpaks.yml
  - from-file: snippets/custom-flatpaks.yml
  - from-file: snippets/custom-fonts.yml
  - from-file: snippets/scripts.yml
  - from-file: snippets/os-release.yml
  - type: initramfs
  - type: signing

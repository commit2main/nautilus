    - dnf-makecache.timer
    - systemd-nsresourced.socket
user:
  enabled:
    - dms.service
    - fcitx5.service
    # - foot-server.service
    # - foot-server.socket
    - gcr-ssh-agent.service
    - gcr-ssh-agent.socket
    - gnome-keyring-daemon.service
    - gnome-keyring-daemon.socket
    - iio-niri.service
    - udiskie.service
